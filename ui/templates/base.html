<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrowdSec GUI{% block title_suffix %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('dashboard') }}" class="brand">🛡 CrowdSec GUI</a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('decisions') }}">Decisions</a>
      <a href="{{ url_for('alerts') }}">Alerts</a>
      <a href="{{ url_for('audit') }}">Audit</a>
    </div>
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer>
    <small>CrowdSec GUI v1 &mdash; helper: <code>{{ config.get('HELPER_URL', '') }}</code></small>
  </footer>
</body>
</html>
